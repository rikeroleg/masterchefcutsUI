# Search-engine bot / social-crawler detection (http-level map, valid here since
# this file is included inside nginx's http {} block)
map $http_user_agent $is_bot {
    default                     0;
    "~*googlebot"               1;
    "~*bingbot"                 1;
    "~*slurp"                   1;
    "~*duckduckbot"             1;
    "~*baiduspider"             1;
    "~*yandexbot"               1;
    "~*facebookexternalhit"     1;
    "~*twitterbot"              1;
    "~*linkedinbot"             1;
    "~*whatsapp"                1;
    "~*slackbot"                1;
    "~*embedly"                 1;
    "~*rogerbot"                1;
    "~*W3C_Validator"           1;
}

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Resolver required when proxy_pass uses a runtime variable
    # 127.0.0.11 is Docker's embedded DNS resolver (works in Cloud Run)
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to the backend
    # ${BACKEND_URL} is substituted by envsubst at container startup.
    location /api/ {
        set $backend "${BACKEND_URL}";
        proxy_pass $backend/api/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # SPA fallback — regular users get index.html; bots get pre-rendered HTML
    location / {
        if ($is_bot = 1) {
            rewrite ^ /_prerender$uri? last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Internal pre-render proxy — only reachable via the rewrite above.
    # ${RENDERTRON_URL} is substituted by envsubst at container startup.
    location ~* ^/_prerender(.*)$ {
        internal;
        set $rt "${RENDERTRON_URL}";
        proxy_pass $rt/render?url=https://masterchefcuts.com$1;
        proxy_set_header Host masterchefcuts.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://storage.googleapis.com data: blob:; connect-src 'self' https://api.stripe.com https://masterchefcuts-eqilqj43qa-uc.a.run.app https://storage.googleapis.com; frame-src https://js.stripe.com; font-src 'self' data:; worker-src blob:;" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
}
