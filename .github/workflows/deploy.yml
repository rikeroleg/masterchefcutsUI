name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: gen-lang-client-0273518275

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=https://masterchefcuts-eqilqj43qa-uc.a.run.app \
            --build-arg VITE_STRIPE_PUBLIC_KEY=${{ secrets.VITE_STRIPE_PUBLIC_KEY }} \
            -t us-central1-docker.pkg.dev/gen-lang-client-0273518275/mastercheifcuts/masterchefcuts-ui:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/gen-lang-client-0273518275/mastercheifcuts/masterchefcuts-ui:latest \
            .

      - name: Push Docker image
        run: |
          docker push us-central1-docker.pkg.dev/gen-lang-client-0273518275/mastercheifcuts/masterchefcuts-ui:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/gen-lang-client-0273518275/mastercheifcuts/masterchefcuts-ui:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy masterchefcuts-ui \
            --image us-central1-docker.pkg.dev/gen-lang-client-0273518275/mastercheifcuts/masterchefcuts-ui:${{ github.sha }} \
            --project gen-lang-client-0273518275 \
            --region us-central1 \
            --platform managed \
            --port 80 \
            --allow-unauthenticated \
            --quiet
