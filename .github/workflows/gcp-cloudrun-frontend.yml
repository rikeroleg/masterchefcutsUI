name: Deploy Frontend to Google Cloud Run

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: gen-lang-client-0273518275
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY_REPO: mastercheifcuts
  CLOUD_RUN_SERVICE: masterchefcuts-ui

jobs:
  deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
          VITE_API_URL: https://masterchefcuts-eqilqj43qa-uc.a.run.app
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPO}/masterchefcuts-ui:${IMAGE_TAG}"
          docker build \
            --build-arg VITE_API_URL="${VITE_API_URL}" \
            --build-arg VITE_STRIPE_PUBLIC_KEY="${VITE_STRIPE_PUBLIC_KEY}" \
            -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image "${{ steps.build-image.outputs.image }}" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --port 80 \
            --allow-unauthenticated \
            --quiet
